spring.application.name=backend

# Local default datasource. Override with standard Spring env vars such as
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, and SPRING_DATASOURCE_PASSWORD.
spring.datasource.url=jdbc:h2:file:./data/mindmeshdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA settings
# ddl-auto set to update, to automatically modify the schema to fit future entities
# More deployment convenience. BETTER DISABLE later
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# enable console, viewed in browser through /h2-console endpoint
# Remember that spring security blocks this by default, need to allow /h2-console/ in SecurityConfig
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=${JWT_SECRET:sfTv/7R8If5Co9pmetKOuRXj5a94mxtdvKmUn6d76VLTosAN9DucEXWn9a+JKgmHS3ms4JSB7E1KMT7IEBsjlg==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# AI api stuff
mindmesh.ai.api-key=${MINDMESH_AI_API_KEY:}
mindmesh.ai.base-url=${MINDMESH_AI_BASE_URL:}
mindmesh.ai.model=${MINDMESH_AI_MODEL:}
mindmesh.ai.timeout-ms=${MINDMESH_AI_TIMEOUT_MS:30000}
