spring.application.name=backend

spring.profiles.group.local=local-ai-fake
spring.profiles.group.production=real-ai

# Local default datasource. Override with standard Spring env vars such as
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, and SPRING_DATASOURCE_PASSWORD.
spring.datasource.url=jdbc:sqlite:./data/mindmesh.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA settings
# ddl-auto set to update, to automatically modify the schema to fit future entities
# More deployment convenience. BETTER DISABLE later
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# AI api stuff
mindmesh.ai.api-key=${MINDMESH_AI_API_KEY:}
mindmesh.ai.base-url=${MINDMESH_AI_BASE_URL:}
mindmesh.ai.model=${MINDMESH_AI_MODEL:}
mindmesh.ai.timeout-ms=${MINDMESH_AI_TIMEOUT_MS:30000}
